<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TowCalc</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:system-ui;background:#0b0d10;color:#eee;margin:0}
header{padding:10px;background:#111}
.tabs{display:flex;gap:8px;padding:10px;background:#151a21}
.tabs button{padding:8px 12px}
.panel{display:none;padding:12px}
.panel.active{display:block}
</style>
</head>
<body>

<header><b>TowCalc</b></header>

<div class="tabs">
<button data-tab="results">Results</button>
<button data-tab="trip">Trip</button>
<button data-tab="trucks">Trucks</button>
<button data-tab="trailers">Trailers</button>
</div>

<div id="results" class="panel active">
<h2>Results</h2>
<div id="output"></div>
</div>

<div id="trip" class="panel">
<h2>Trip</h2>
<select id="truckSelect"></select>
<select id="trailerSelect"></select>
</div>

<div id="trucks" class="panel">
<h2>Trucks</h2>
<div id="truckList"></div>
</div>

<div id="trailers" class="panel">
<h2>Trailers</h2>
<div id="trailerList"></div>
</div>

<script src="app.js"></script>
</body>
</html>
